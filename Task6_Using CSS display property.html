<!DOCTYPE html>
<html>
<head>
    <title>LabTask6-1</title>

    <style>
        body{
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            background-color: #f2f2f2;
        }

        .textbox{
            width: 800px;
            margin: auto;
        }

        .block-input{
            display: block;
            width: 300px;
            padding: 8px;
            margin: 5px 0;
        }

        .inline-section{
            margin-top: 20px;
        }

        .inline-section p{
            display: inline-block;
            width: 400px;
            vertical-align: middle;
        }

        .inline-section button{
            display: inline-block;
            vertical-align: middle;
            padding: 8px 15px;
            margin-left: 5px;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }
        

        .google{
            text-align: center;
            margin-top: 40px;
        }

        .google img{
            width: 250px;
            display: block;
            margin: 0 auto 15px auto;
        }

        .google input{
            width: 400px;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid gray;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }

        .signup{
            width: 350px;
            background: white;
            padding: 20px;
            margin-top: 40px;
        }

        .signup input{
            width: 49%;
            padding: 10px;
            margin-bottom: 10px;
            display: inline-block;
            box-sizing: border-box;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }

        .signup .email{
            width: 100%;
            display: block;
        }

        .signup button{
            width: 100%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }

        .uber{
            width: 350px;
            background: white;
            padding: 30px;
            margin-top: 40px;
        }

        .uber input{
            width: 95%;
            padding: 10px;
            margin-bottom: 15px;
            display: block;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }

        .uber button{
            padding: 10px 15px;
            display: inline-block;
            margin-right: 5px;
            border: none;
        }

        .black{
            background: black;
            color: white;
        }

        .gray{
            background: lightgray;
        }

    </style>
</head>

<body>

<div class="textbox">

    <input type="text" placeholder="Name" class="block-input">
    <input type="text" placeholder="Email" class="block-input">

    <div class="inline-section">
        <p>
            Thanks for chatting with our customer support.
            Would you like to take our quick survey?
        </p>

        <button>Yes</button>
        <button>No</button>
    </div>

    <div class="google">
        <img src="https://logos-world.net/wp-content/uploads/2020/09/Google-Logo.png">
        <input type="text" placeholder="Search Google or type a URL">
    </div>

    <div class="signup">
        <h2>Sign Up</h2>
        <input type="text" placeholder="First name">
        <input type="text" placeholder="Last name">
        <input type="text" placeholder="Email" class="email">
        <button>Sign Up</button>
    </div>

    <div class="uber">
        <h2>Request a ride now</h2>
        <input type="text" placeholder="Enter pickup location">
        <input type="text" placeholder="Enter destination">
        <button class="black">Request now</button>
        <button class="gray">Schedule for later</button>
    </div>

</div>

</body>
</html>
